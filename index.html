<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" id="themeColorMeta" content="#10131b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TCTV" />
  <meta name="application-name" content="TCTV" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="assets/app-logo.svg" />
  <link rel="apple-touch-icon" href="assets/app-logo.svg" />
  <title>Tamil Christian TV</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --bg-primary: #10131b;
      --bg-secondary: #171b27;
      --text-primary: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.72);
      --card-bg: rgba(255, 255, 255, 0.06);
      --accent: #4a90e2;
      --border-radius: 16px;
      --border-soft: rgba(255, 255, 255, 0.08);
      --top-bar-bg: rgba(16, 19, 27, 0.82);
    }

    [data-theme="light"] {
      --bg-primary: #f2f4fb;
      --bg-secondary: #ffffff;
      --text-primary: #111827;
      --text-muted: rgba(17, 24, 39, 0.72);
      --card-bg: #ffffff;
      --accent: #1a73e8;
      --border-soft: rgba(17, 24, 39, 0.1);
      --top-bar-bg: rgba(255, 255, 255, 0.88);
    }

    [data-theme="gold"] {
      --bg-primary: #0f0f10;
      --bg-secondary: #1a1713;
      --text-primary: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.76);
      --card-bg: rgba(255, 215, 0, 0.08);
      --accent: #FFD700;
      --border-soft: rgba(255, 215, 0, 0.22);
      --top-bar-bg: rgba(15, 15, 16, 0.82);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at top, #22293d 0%, var(--bg-primary) 45%);
      color: var(--text-primary);
      display: flex;
      align-items: stretch;
      overflow: hidden;
      padding: 0 10px;
    }

    [data-theme="light"] body {
      background: radial-gradient(circle at top, #dfe8ff 0%, var(--bg-primary) 52%);
    }

    [data-theme="gold"] body {
      background: radial-gradient(circle at top, #30260f 0%, var(--bg-primary) 55%);
    }

    .app-shell {
      width: min(100%, 940px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 100%;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border-soft);
      border-right: 1px solid var(--border-soft);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.32);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    body.app-ready .app-shell {
      opacity: 1;
      transform: translateY(0);
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--top-bar-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: calc(12px + env(safe-area-inset-top)) 16px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border-soft);
    }

    .app-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .app-logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      flex-shrink: 0;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.28);
    }

    .app-brand h1 {
      font-size: 1.12rem;
      font-weight: 700;
      letter-spacing: 0.2px;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .control-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.14);
      border: 1px solid var(--border-soft);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .control-btn:active {
      transform: scale(0.96);
    }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 12px 8px;
      padding: 0 12px;
      border-radius: 12px;
      border: 1px solid var(--border-soft);
      background: rgba(255, 255, 255, 0.04);
    }

    .search-wrap i {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .search-box {
      width: 100%;
      padding: 12px 0;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
    }

    .search-box::placeholder {
      color: var(--text-muted);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 8px 12px 10px;
      padding: 0 4px;
    }

    .section-header h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .channel-count {
      font-size: 0.78rem;
      border-radius: 999px;
      padding: 4px 10px;
      border: 1px solid var(--border-soft);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-muted);
    }

    .scrollable-content {
      flex: 1;
      overflow-y: auto;
      padding-bottom: calc(84px + env(safe-area-inset-bottom));
      scroll-behavior: smooth;
    }

    .channel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(152px, 1fr));
      gap: 12px;
      padding: 0 12px;
    }

    .channel-card {
      background: var(--card-bg);
      border-radius: var(--border-radius);
      padding: 14px 10px 12px;
      text-align: center;
      cursor: pointer;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      border: 1px solid var(--border-soft);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      overflow: hidden;
    }

    .channel-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(74, 144, 226, 0.18);
    }

    .channel-card:active {
      transform: scale(0.98);
      box-shadow: 0 4px 12px rgba(74, 144, 226, 0.24);
    }

    .channel-logo {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 50%;
      background: #444;
      border: 2px solid rgba(255, 255, 255, 0.14);
    }

    .channel-name {
      font-size: 0.88rem;
      font-weight: 600;
      margin-top: 8px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badges {
      display: flex;
      gap: 4px;
      margin-top: 4px;
      justify-content: center;
    }

    .badge {
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 10px;
    }

    .badge-live {
      background: rgba(229, 9, 20, 0.2);
      color: #e50914;
      font-weight: bold;
    }

    .badge-audio {
      background: rgba(255, 215, 0, 0.15);
      color: #FFD700;
    }

    .now-playing-indicator {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(74, 144, 226, 0.22);
      color: var(--accent);
      display: grid;
      place-items: center;
      font-size: 0.62rem;
      border: 1px solid rgba(74, 144, 226, 0.4);
    }

    .bottom-tabs {
      position: sticky;
      bottom: 0;
      z-index: 100;
      display: flex;
      justify-content: space-around;
      background: var(--top-bar-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid var(--border-soft);
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    }

    .tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 0.78rem;
      padding: 6px 0;
      width: 33%;
      opacity: 0.72;
      transition: opacity 0.18s ease, color 0.18s ease;
    }

    .tab.active {
      opacity: 1;
      font-weight: 700;
      color: var(--accent);
    }

    .tab i {
      font-size: 1.2rem;
      margin-bottom: 4px;
    }

    .message {
      text-align: center;
      padding: 32px 20px;
      color: var(--text-muted);
      grid-column: 1 / -1;
      border-radius: 12px;
      border: 1px dashed var(--border-soft);
      background: rgba(255, 255, 255, 0.02);
    }

    #toast {
      position: fixed;
      bottom: calc(96px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.78);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.9rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 1000;
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 215, 0, 0.3);
      transform: scale(0);
      animation: ripple 0.6s linear;
      pointer-events: none;
    }

    @keyframes ripple {
      to {
        transform: scale(2);
        opacity: 0;
      }
    }

    .splash-screen {
      position: fixed;
      inset: 0;
      z-index: 3000;
      display: grid;
      place-items: center;
      background: #ffffff;
      opacity: 1;
      transition: opacity 0.45s ease;
    }

    .splash-screen.hide {
      opacity: 0;
      pointer-events: none;
    }

    .splash-logo {
      width: min(64vw, 280px);
      height: auto;
      border-radius: 18%;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.18);
    }
  </style>
</head>
<body>
  <div class="splash-screen" id="splashScreen" aria-label="Splash screen">
    <img src="assets/app-logo.svg" class="splash-logo" alt="TCTV JayathaSoft logo">
  </div>

  <div class="app-shell">
    <div class="top-bar">
      <button class="control-btn" id="playLastBtn" title="Play last channel" style="display:none;">
        <i class="fas fa-play"></i>
      </button>
      <div class="app-brand">
        <img src="assets/app-logo.svg" class="app-logo" alt="TCTV logo">
        <h1>Tamil Christian TV</h1>
      </div>
      <button class="control-btn" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
      </button>
    </div>

    <div class="search-wrap">
      <i class="fas fa-magnifying-glass"></i>
      <input type="text" class="search-box" id="searchInput" placeholder="Search channels...">
    </div>

    <div class="section-header">
      <h2 id="channelSectionTitle">Live Channels</h2>
      <span class="channel-count" id="channelCount">0 channels</span>
    </div>

    <div class="scrollable-content">
      <div class="channel-grid" id="channelGrid">
        <div class="message">Loading channels…</div>
      </div>
    </div>

    <div class="bottom-tabs">
      <a href="index.html" class="tab active" id="tab-tv">
        <i class="fas fa-tv"></i>
        <span>TV</span>
      </a>
      <a href="#" class="tab" id="tab-fav">
        <i class="fas fa-heart"></i>
        <span>Favourites</span>
      </a>
      <a href="about.html" class="tab" id="tab-about">
        <i class="fas fa-info-circle"></i>
        <span>About Us</span>
      </a>
    </div>
  </div>

  <div id="toast">Added to Favourites!</div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((error) => {
          console.error('Service worker registration failed:', error);
        });
      });
    }

    const splashScreen = document.getElementById('splashScreen');
    setTimeout(() => {
      splashScreen.classList.add('hide');
      document.body.classList.add('app-ready');
      setTimeout(() => splashScreen.remove(), 500);
    }, 5000);

    // =============== Theme ===============
    const htmlRoot = document.getElementById('htmlRoot');
    const themeToggleBtn = document.getElementById('themeToggle');
    const themeColorMeta = document.getElementById('themeColorMeta');
    const savedTheme = localStorage.getItem('theme') || 'dark';
    htmlRoot.setAttribute('data-theme', savedTheme);
    updateThemeIcon(savedTheme);
    updateThemeColor(savedTheme);

    function updateThemeIcon(theme) {
      if (theme === 'dark') themeToggleBtn.innerHTML = '<i class="fas fa-moon"></i>';
      else if (theme === 'light') themeToggleBtn.innerHTML = '<i class="fas fa-sun"></i>';
      else themeToggleBtn.innerHTML = '<i class="fas fa-gem"></i>';
    }

    function updateThemeColor(theme) {
      const color = theme === 'light' ? '#f2f4fb' : theme === 'gold' ? '#0f0f10' : '#10131b';
      themeColorMeta.setAttribute('content', color);
    }

    themeToggleBtn.addEventListener('click', () => {
      const themes = ['dark', 'light', 'gold'];
      const current = htmlRoot.getAttribute('data-theme');
      const currentIndex = themes.indexOf(current);
      const newTheme = themes[(currentIndex + 1) % themes.length];
      htmlRoot.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeIcon(newTheme);
      updateThemeColor(newTheme);
    });

    // =============== Toast ===============
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.opacity = '1';
      setTimeout(() => toast.style.opacity = '0', 2000);
    }

    // =============== Ripple + Haptic ===============
    function createRipple(event, element) {
      const ripple = document.createElement('div');
      ripple.classList.add('ripple');
      const rect = element.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = `${size}px`;
      ripple.style.left = `${event.clientX - rect.left - size / 2}px`;
      ripple.style.top = `${event.clientY - rect.top - size / 2}px`;
      element.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    }

    function hapticFeedback() {
      if (window.navigator.vibrate) navigator.vibrate(20);
    }

    // =============== Favourites ===============
    let favourites = JSON.parse(localStorage.getItem('favourites')) || [];
    let allChannels = [];
    let currentView = 'all';

    function updateSectionMeta(label, count) {
      const title = document.getElementById('channelSectionTitle');
      const badge = document.getElementById('channelCount');
      title.textContent = label;
      badge.textContent = `${count} channel${count === 1 ? '' : 's'}`;
    }

    function saveFavourites() {
      localStorage.setItem('favourites', JSON.stringify(favourites));
    }

    function isFavourite(id) {
      return favourites.includes(id);
    }

    function toggleFavourite(id) {
      const wasFav = isFavourite(id);
      if (wasFav) {
        favourites = favourites.filter(f => f !== id);
        showToast('Removed from Favourites');
      } else {
        favourites.push(id);
        showToast('Added to Favourites!');
      }
      saveFavourites();
      if (currentView === 'fav') renderChannels('fav');
    }

    // =============== Long Press ===============
    function attachLongPress(element, channelId) {
      let pressTimer = null;
      const start = (e) => {
        pressTimer = setTimeout(() => {
          toggleFavourite(channelId);
          hapticFeedback();
          createRipple(e, element);
        }, 600);
      };
      const cancel = () => { if (pressTimer) clearTimeout(pressTimer); };
      element.addEventListener('touchstart', start, { passive: true });
      element.addEventListener('touchmove', cancel, { passive: true });
      element.addEventListener('touchend', cancel, { passive: true });
      element.addEventListener('mousedown', start);
      element.addEventListener('mouseup', cancel);
      element.addEventListener('mouseleave', cancel);
    }

    // =============== Tabs ===============
    function updateTabActive(tabName) {
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      if (tabName === 'tv') document.getElementById('tab-tv').classList.add('active');
      if (tabName === 'fav') document.getElementById('tab-fav').classList.add('active');
      if (tabName === 'about') document.getElementById('tab-about').classList.add('active');
    }

    document.getElementById('tab-tv').addEventListener('click', (e) => {
      e.preventDefault();
      currentView = 'all';
      updateTabActive('tv');
      history.replaceState(null, '', window.location.pathname);
      renderChannels('all');
    });

    document.getElementById('tab-fav').addEventListener('click', (e) => {
      e.preventDefault();
      currentView = 'fav';
      updateTabActive('fav');
      history.replaceState(null, '', `${window.location.pathname}#favourites`);
      renderChannels('fav');
    });

    // About tab handled by href="about.html"

    // =============== Play Last ===============
    const lastChannelId = localStorage.getItem('lastPlayedChannelId');
    const playLastBtn = document.getElementById('playLastBtn');
    if (lastChannelId) {
      playLastBtn.style.display = 'flex';
      playLastBtn.onclick = () => {
        window.location.href = `player.html?channel=${lastChannelId}`;
      };
    }

    // =============== Search ===============
    document.getElementById('searchInput').addEventListener('input', (e) => {
      if (currentView === 'all') {
        const term = e.target.value.trim().toLowerCase();
        if (term === '') {
          renderChannels('all');
        } else {
          const filtered = allChannels.filter(ch => 
            ch.name.toLowerCase().includes(term)
          );
          renderFiltered(filtered);
        }
      }
    });

    // =============== High-Quality Audio Channels ===============
    const highQualityIds = [3, 4, 14, 15]; // Angel TV Europe/India, Gospel TV, Grace TV

    function renderFiltered(channels) {
      const grid = document.getElementById('channelGrid');
      grid.innerHTML = '';
      updateSectionMeta('Search Results', channels.length);
      if (channels.length === 0) {
        grid.innerHTML = '<div class="message">No matching channels</div>';
        return;
      }
      const nowPlayingId = localStorage.getItem('nowPlayingChannelId');
      channels.forEach(channel => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        let badges = '<div class="badges"><span class="badge badge-live">LIVE</span>';
        if (highQualityIds.includes(channel.id)) {
          badges += '<span class="badge badge-audio">🔊 HD</span>';
        }
        badges += '</div>';
        let html = `
          <img src="${channel.logo || ''}" class="channel-logo" alt="${channel.name}" onerror="this.style.background='#555'">
          <div class="channel-name">${channel.name}</div>
          ${badges}
        `;
        if (String(channel.id) === nowPlayingId) {
          html += '<div class="now-playing-indicator"><i class="fas fa-play"></i></div>';
        }
        card.innerHTML = html;
        card.addEventListener('click', () => {
          localStorage.setItem('lastPlayedChannelId', channel.id);
          localStorage.removeItem('nowPlayingChannelId');
          window.location.href = `player.html?channel=${channel.id}`;
        });
        attachLongPress(card, channel.id);
        grid.appendChild(card);
      });
    }

    // =============== Fetch & Render ===============
    async function fetchChannels() {
      const sources = [
        'https://raw.githubusercontent.com/simsonpeter/Tctvs/refs/heads/main/tv.json',
        'tv.json'
      ];
      for (const source of sources) {
        try {
          const response = await fetch(source, { cache: 'no-store' });
          if (!response.ok) continue;
          const channels = await response.json();
          if (Array.isArray(channels) && channels.length > 0) return channels;
        } catch (err) {
          // Try next source.
        }
      }
      return [];
    }

    function renderChannels(view = 'all') {
      const grid = document.getElementById('channelGrid');
      let channelsToShow = view === 'fav'
        ? allChannels.filter(ch => isFavourite(ch.id))
        : allChannels;
      updateSectionMeta(view === 'fav' ? 'Favourite Channels' : 'Live Channels', channelsToShow.length);

      if (channelsToShow.length === 0) {
        grid.innerHTML = `<div class="message">${
          view === 'fav' 
            ? 'No favourites yet. Long-press any channel to add!' 
            : 'No channels available. Check your connection.'
        }</div>`;
        return;
      }

      grid.innerHTML = '';
      const nowPlayingId = localStorage.getItem('nowPlayingChannelId');
      channelsToShow.forEach(channel => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        let badges = '<div class="badges"><span class="badge badge-live">LIVE</span>';
        if (highQualityIds.includes(channel.id)) {
          badges += '<span class="badge badge-audio">🔊 HD</span>';
        }
        badges += '</div>';
        let html = `
          <img src="${channel.logo || ''}" class="channel-logo" alt="${channel.name}" onerror="this.style.background='#555'">
          <div class="channel-name">${channel.name}</div>
          ${badges}
        `;
        if (String(channel.id) === nowPlayingId) {
          html += '<div class="now-playing-indicator"><i class="fas fa-play"></i></div>';
        }
        card.innerHTML = html;
        card.addEventListener('click', () => {
          localStorage.setItem('lastPlayedChannelId', channel.id);
          localStorage.removeItem('nowPlayingChannelId');
          window.location.href = `player.html?channel=${channel.id}`;
        });
        attachLongPress(card, channel.id);
        grid.appendChild(card);
      });
    }

    // =============== Init ===============
    (async () => {
      allChannels = await fetchChannels();
      const openFavourites = window.location.hash.toLowerCase() === '#favourites';
      currentView = openFavourites ? 'fav' : 'all';
      updateTabActive(openFavourites ? 'fav' : 'tv');
      renderChannels(currentView);
    })();
  </script>
</body>
</html>
